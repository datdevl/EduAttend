<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduAttend — Quản Lý Điểm Danh</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #8a8880;
    --accent: #2563eb;
    --accent-light: #eff6ff;
    --danger: #dc2626;
    --success: #16a34a;
    --success-light: #f0fdf4;
    --danger-light: #fef2f2;
    --radius: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  nav {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 40px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); }
  .nav-logo span { color: var(--text); }
  .nav-links { display: flex; gap: 8px; }
  .nav-links a {
    padding: 8px 16px; border-radius: 8px; text-decoration: none;
    color: var(--muted); font-size: 14px; font-weight: 500; transition: all 0.2s;
  }
  .nav-links a:hover { background: var(--bg); color: var(--text); }
  .nav-links a.active { background: var(--accent-light); color: var(--accent); }

  .container { max-width: 1100px; margin: 0 auto; padding: 40px; }

  .page-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px;
  }
  .page-header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
  .page-header p { font-size: 14px; color: var(--muted); margin-top: 4px; }

  /* SEARCH + FILTER */
  .toolbar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: var(--shadow);
  }
  .search-input {
    flex: 1; min-width: 200px;
    padding: 10px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }
  .search-input:focus { border-color: var(--accent); background: var(--surface); }
  .filter-select {
    padding: 10px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    cursor: pointer;
  }
  .count-label {
    font-size: 13px; color: var(--muted); font-weight: 500;
    padding: 8px 14px;
    background: var(--bg);
    border-radius: 8px;
    white-space: nowrap;
  }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--bg); }
  th {
    padding: 14px 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .face-thumb {
    width: 48px; height: 48px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid var(--border);
    display: block;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .face-thumb:hover { transform: scale(1.1); }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: 100px;
    font-size: 12px; font-weight: 600;
  }
  .badge.ok { background: var(--success-light); color: var(--success); }
  .badge.no { background: var(--danger-light); color: var(--danger); }

  .row-num {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .id-code {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    padding: 3px 8px;
    border-radius: 6px;
  }
  .name-cell { font-weight: 600; }

  .action-btns { display: flex; gap: 6px; }
  .btn-sm {
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px; font-weight: 600;
    cursor: pointer;
    border: 1.5px solid;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-ok  { border-color: #bbf7d0; color: var(--success); background: var(--success-light); }
  .btn-ok:hover  { background: var(--success); color: white; }
  .btn-no  { border-color: #fecaca; color: var(--danger); background: var(--danger-light); }
  .btn-no:hover  { background: var(--danger); color: white; }

  /* IMAGE MODAL */
  .modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal.open { display: flex; }
  .modal img {
    max-width: 90vw; max-height: 90vh;
    border-radius: 16px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  }
  .modal-close {
    position: absolute; top: 24px; right: 24px;
    background: white; border: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .skeleton { background: linear-gradient(90deg, var(--border) 25%, var(--bg) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; height: 20px; }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .container { padding: 24px 20px; }
    th:nth-child(1), td:nth-child(1),
    th:nth-child(3), td:nth-child(3) { display: none; }
  }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Edu<span>Attend</span></div>
  <div class="nav-links">
    <a href="index.html">Trang chủ</a>
    <a href="faceID.html">Điểm danh</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="manage.html" class="active">Quản lý</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div>
      <h1>Quản lý điểm danh</h1>
      <p>Xem và cập nhật trạng thái điểm danh của sinh viên</p>
    </div>
  </div>

  <div class="toolbar">
    <input class="search-input" type="text" id="searchInput" placeholder="🔍 Tìm kiếm tên, ID, vị trí..." oninput="filterTable()">
    <select class="filter-select" id="filterStatus" onchange="filterTable()">
      <option value="">Tất cả trạng thái</option>
      <option value="ok">✅ Đã điểm danh</option>
      <option value="no">❌ Vắng mặt</option>
    </select>
    <div class="count-label" id="countLabel">Đang tải...</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Ảnh</th>
          <th>ID</th>
          <th>Họ tên</th>
          <th>Thời gian</th>
          <th>Vị trí</th>
          <th>Buổi</th>
          <th>Trạng thái</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--muted)">Đang tải dữ liệu...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- IMAGE MODAL -->
<div class="modal" id="imgModal" onclick="closeModal()">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <img id="modalImg" src="" alt="Ảnh điểm danh">
</div>

<script src="manage.js"></script>
</body>
</html>
